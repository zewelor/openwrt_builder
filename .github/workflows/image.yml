name: Build images

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    paths:
      - '**'
      - '!README.md'
      - '!.github/workflows/**'
      - '.github/workflows/image.yml'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          services=$(docker compose config --services | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix={\"service\":$services}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build ${{ matrix.service }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          chmod a+w output
          rm -rf output/*
          docker compose pull ${{ matrix.service }}
          docker compose run --rm ${{ matrix.service }}
      - name: Rename output files
        run: ./firmware_renamer.sh "${{ matrix.service }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.service }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}
      - name: Read OpenWrt version
        id: read_version
        run: |
          version="$(grep '^OPENWRT_VERSION=' .env | cut -d= -f2-)"
          if [ -z "$version" ]; then
            echo "OPENWRT_VERSION not found in .env" >&2
            exit 1
          fi
          echo "openwrt_version=$version" >> "$GITHUB_OUTPUT"
      - name: Move release tag to current commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -fa "${{ steps.read_version.outputs.openwrt_version }}" -m "Release ${{ steps.read_version.outputs.openwrt_version }}" "$GITHUB_SHA"
          git push --force origin "refs/tags/${{ steps.read_version.outputs.openwrt_version }}"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: output
          merge-multiple: true
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "output/*-sysupgrade.*,output/*-factory.bin"
          allowUpdates: true
          makeLatest: true
          tag: ${{ steps.read_version.outputs.openwrt_version }}
          token: ${{ secrets.PAT }}
      - name: Delete workflow artifacts
        uses: GeekyEggo/delete-artifact@v6
        with:
          name: '*'
