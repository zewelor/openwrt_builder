name: update_version

on:
  schedule:
    - cron: "0 5 21 * *"
  workflow_dispatch:

jobs:
  update_version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Setup git
        run: |
          git config push.default current
          git config user.name github-actions
          git config user.email github-actions@github.com

      - id: latest_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/openwrt/openwrt/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update .env version
        run: |
          set -euo pipefail

          VERSION="${{ steps.latest_version.outputs.version }}"

          if ! grep -q '^OPENWRT_VERSION=' .env; then
            echo "OPENWRT_VERSION not found in .env" >&2
            exit 1
          fi

          sed -i -e "s/^OPENWRT_VERSION=.*/OPENWRT_VERSION=${VERSION}/" .env
          git add .env

          if git diff --cached --quiet; then
            echo "OPENWRT_VERSION already set to ${VERSION}"
            exit 0
          fi

          git commit -m "Bump version ${VERSION} from GitHub Actions"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin --tags
          git push origin
